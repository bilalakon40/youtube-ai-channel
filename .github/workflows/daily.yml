name: إنشاء ونشر فيديو يوتيوب يومي

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: تثبيت الأدوات
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q ffmpeg espeak
          echo "✅ ffmpeg: $(ffmpeg -version 2>&1 | head -1)"
          echo "✅ espeak: $(espeak --version 2>&1 | head -1)"

      - name: تثبيت الحزم
        run: npm install

      - name: اختبار Groq API
        run: |
          node -e "
          fetch('https://api.groq.com/openai/v1/chat/completions', {
            method:'POST',
            headers:{'Content-Type':'application/json', Authorization:'Bearer ${{ secrets.GROQ_API_KEY }}'},
            body:JSON.stringify({model:'llama-3.3-70b-versatile', messages:[{role:'user', content:'قل مرحبا'}], max_tokens:10})
          }).then(r=>r.json()).then(d=>console.log('✅ Groq:', d.choices[0].message.content)).catch(e=>console.error('❌ Groq:', e.message))
          "

      - name: إنشاء السكريبت فقط
        run: node -e "
          const {generateScript} = require('./src/script');
          generateScript().then(s=>console.log('✅ Script done')).catch(e=>{console.error('❌',e.message);process.exit(1)})
          "
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
