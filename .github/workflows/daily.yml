name: إنشاء ونشر فيديو يوتيوب يومي

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: تثبيت الأدوات
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q ffmpeg espeak espeak-data
          echo "espeak test: $(echo 'مرحبا' | espeak -v arabic -w /tmp/test.wav 2>&1 && echo OK || echo FAIL)"

      - name: تثبيت الحزم
        run: npm install

      - name: تشغيل الوكيل
        run: node src/index.js 2>&1
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
