name: إنشاء ونشر فيديو يوتيوب يومي

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: تثبيت الأدوات
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q ffmpeg espeak-ng espeak-ng-data
          sudo ln -sf /usr/bin/espeak-ng /usr/bin/espeak
          pip install edge-tts 2>&1 | tail -1
          echo "edge-tts: $(edge-tts --list-voices 2>&1 | grep -i arabic | head -1)"

      - name: تثبيت الحزم
        run: npm install

      - name: تشغيل الوكيل
        run: node src/index.js 2>&1
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
